<!DOCTYPE html>
<html>
<head>
    <title>Test Input Field</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        input { padding: 10px; font-size: 16px; border: 1px solid #ccc; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Test Input Field</h1>
    <label for="testInput">Full Name:</label>
    <input type="text" id="testInput" placeholder="Type here..." style="width: 300px;">
    <p>Typed characters: <span id="output"></span></p>
    
    <script>
        const input = document.getElementById('testInput');
        const output = document.getElementById('output');
        
        input.addEventListener('input', function(e) {
            output.textContent = e.target.value;
        });
    </script>
</body>
</html>
